services:

  apirest:
    ports:
      - 127.0.0.1:${COMPOSE_PROJECT_PORT}:80
    networks:
      net: {}

networks:
  net:
    driver: bridge
    external: true
    name: ${COMPOSE_PROJECT_LEAD}-${COMPOSE_PROJECT_CNET}
  default:
    name: ${COMPOSE_PROJECT_LEAD}-${COMPOSE_PROJECT_CNET}
    external: true